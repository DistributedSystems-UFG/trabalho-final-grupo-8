# ─────────────────────────────────────────────────────────────────────────────
# Aquarela.io — Docker Compose (development)
# Orquestra: gateway, worker, frontend, rabbitmq, postgres
#
# Uso:
#   cp .env.example .env   # editar senhas se necessário
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL (Primary / read-write) ───────────────────────────────────────
  # Primary node for streaming replication. Escritas (upserts de chunks) vão
  # sempre para cá; a réplica (postgres-replica) recebe o WAL e serve os SELECTs
  # de restauração de canvas — satisfazendo "Replicação de dados" da spec.
  postgres:
    image: postgres:16-alpine
    container_name: aquarela-postgres
    restart: unless-stopped
    # Flags de replicação física: habilitam WAL senders e hot standby para que
    # a réplica possa fazer streaming a partir deste primário.
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "listen_addresses=*"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Credenciais da role de replicação criada por 02-setup-replication.sh.
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # SQL init scripts are run once on first container creation
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # Cria a role de replicação e libera o pg_hba para conexões de replicação.
      - ./infra/postgres/02-setup-replication.sh:/docker-entrypoint-initdb.d/02-setup-replication.sh:ro
    ports:
      - "5432:5432"
    networks:
      - aquarela-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── PostgreSQL (Replica / read-only) ────────────────────────────────────────
  # Standby em hot_standby: recebe o WAL do primário via streaming e responde
  # apenas leituras. O Gateway usa esta réplica para fetchRoomChunks (readPool),
  # com fallback automático para o primário se ela estiver indisponível.
  postgres-replica:
    image: postgres:16-alpine
    container_name: aquarela-postgres-replica
    restart: unless-stopped
    # Precisa iniciar como root para ajustar owner/perms do PGDATA antes de
    # rodar o pg_basebackup como usuário postgres (ver replica-entrypoint.sh).
    user: root
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    entrypoint: ["bash", "/usr/local/bin/replica-entrypoint.sh"]
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./infra/postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aquarela-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: aquarela-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"       # AMQP
      - "15672:15672"     # Management UI
    networks:
      - aquarela-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Shared version store for distributed Optimistic Concurrency Control (OCC).
  # All Gateway replicas read/write chunk versions here so OCC is consistent
  # across instances (replaces the former in-memory Map per process).
  redis:
    image: redis:7-alpine
    container_name: aquarela-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - aquarela-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Nginx (Load Balancer) ───────────────────────────────────────────────────
  # Single entry point for HTTP and WebSocket traffic, distributing requests
  # across the 3 Gateway replicas via round-robin.
  # WebSocket proxy requires HTTP/1.1 + Upgrade/Connection headers (see nginx.conf).
  nginx:
    image: nginx:1.25-alpine
    container_name: aquarela-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - aquarela-net
    depends_on:
      - gateway

  # ── Gateway (Node.js) ───────────────────────────────────────────────────────
  # Scaled to 3 replicas. container_name is intentionally absent — Docker
  # cannot assign the same static name to multiple containers.
  # Port 3000 is NOT exposed to the host; Nginx (port 80) is the only ingress.
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      REDIS_URL: ${REDIS_URL}
      # Host da réplica de leitura consumida pelo readPool (fetchRoomChunks).
      POSTGRES_READ_HOST: ${POSTGRES_READ_HOST}
    networks:
      - aquarela-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 3

  # ── Worker (Python) ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: aquarela-worker
    restart: unless-stopped
    env_file: .env
    networks:
      - aquarela-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Frontend (Vue.js) ───────────────────────────────────────────────────────
  # In development, runs Vite's dev server for HMR.
  # Switch to the multi-stage Dockerfile target for production builds.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aquarela-frontend
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount source for hot-module replacement in development
      - ./frontend:/app
      - /app/node_modules   # anonymous volume keeps container's node_modules intact
    ports:
      - "5173:5173"
    networks:
      - aquarela-net
    depends_on:
      - gateway

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  postgres_replica_data:
  rabbitmq_data:
  redis_data:

# ── Internal Network ──────────────────────────────────────────────────────────
networks:
  aquarela-net:
    driver: bridge
