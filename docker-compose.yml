# ─────────────────────────────────────────────────────────────────────────────
# Aquarela.io — Docker Compose (development)
# Orquestra: gateway, worker, frontend, rabbitmq, postgres
#
# Uso:
#   cp .env.example .env   # editar senhas se necessário
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aquarela-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # SQL init scripts are run once on first container creation
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - aquarela-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: aquarela-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"       # AMQP
      - "15672:15672"     # Management UI
    networks:
      - aquarela-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Shared version store for distributed Optimistic Concurrency Control (OCC).
  # All Gateway replicas read/write chunk versions here so OCC is consistent
  # across instances (replaces the former in-memory Map per process).
  redis:
    image: redis:7-alpine
    container_name: aquarela-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - aquarela-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Nginx (Load Balancer) ───────────────────────────────────────────────────
  # Single entry point for HTTP and WebSocket traffic, distributing requests
  # across the 3 Gateway replicas via round-robin.
  # WebSocket proxy requires HTTP/1.1 + Upgrade/Connection headers (see nginx.conf).
  nginx:
    image: nginx:1.25-alpine
    container_name: aquarela-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - aquarela-net
    depends_on:
      - gateway

  # ── Gateway (Node.js) ───────────────────────────────────────────────────────
  # Scaled to 3 replicas. container_name is intentionally absent — Docker
  # cannot assign the same static name to multiple containers.
  # Port 3000 is NOT exposed to the host; Nginx (port 80) is the only ingress.
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      REDIS_URL: ${REDIS_URL}
    networks:
      - aquarela-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 3

  # ── Worker (Python) ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: aquarela-worker
    restart: unless-stopped
    env_file: .env
    networks:
      - aquarela-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Frontend (Vue.js) ───────────────────────────────────────────────────────
  # In development, runs Vite's dev server for HMR.
  # Switch to the multi-stage Dockerfile target for production builds.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aquarela-frontend
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount source for hot-module replacement in development
      - ./frontend:/app
      - /app/node_modules   # anonymous volume keeps container's node_modules intact
    ports:
      - "5173:5173"
    networks:
      - aquarela-net
    depends_on:
      - gateway

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:

# ── Internal Network ──────────────────────────────────────────────────────────
networks:
  aquarela-net:
    driver: bridge
