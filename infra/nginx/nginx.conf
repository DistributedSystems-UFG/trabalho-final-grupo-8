# ─────────────────────────────────────────────────────────────────────────────
# Aquarela.io — Nginx Load Balancer
#
# Routes HTTP and WebSocket traffic to the 3 Gateway replicas.
#
# WebSocket proxy requires:
#   proxy_http_version 1.1  — WebSocket upgrade only works over HTTP/1.1.
#   Upgrade / Connection headers — signal the broker to switch protocols.
#   proxy_read_timeout 3600s — keep long-lived WS connections alive; the
#     default 60s would close idle paint sessions unexpectedly.
#
# Round-robin is intentional: sticky sessions are NOT needed because:
#   - Canvas state is restored from PostgreSQL on every join (any instance).
#   - Cross-instance stroke sync is handled by RabbitMQ fanout exchanges.
#   - Reconnecting to a different replica is transparent to the client.
# ─────────────────────────────────────────────────────────────────────────────

upstream aquarela_gateway {
    # Docker Compose's embedded DNS resolver expands the "gateway" hostname to
    # all replica IPs, enabling round-robin load balancing automatically.
    server gateway:3000;
}

server {
    listen 80;

    # ── HTTP + WebSocket proxy ────────────────────────────────────────────────
    location / {
        proxy_pass         http://aquarela_gateway;

        # Required for WebSocket protocol upgrade.
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Standard forwarding headers so the Gateway can log real client IPs.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts for persistent WebSocket connections.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }
}
